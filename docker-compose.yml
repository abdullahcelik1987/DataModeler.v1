services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: datamodeler-postgres
    hostname: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-datamodeler}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-PostgresPassword123!}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
      TZ: UTC
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - postgres_logs:/var/log/postgresql
      - ./backend/Database/migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - datamodeler-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-datamodeler}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: datamodeler-redis
    hostname: redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-RedisPassword123!}
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - datamodeler-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - NET_BIND_SERVICE

  # Backend API (.NET 8)
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        BUILD_DATE: ${BUILD_DATE:-$(date -u +'%Y-%m-%dT%H:%M:%SZ')}
        VCS_REF: ${VCS_REF:-unknown}
        VERSION: ${VERSION:-1.0.0}
    container_name: datamodeler-backend
    hostname: backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # ASP.NET Core
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      
      # Database Connection
      ConnectionStrings__DefaultConnection: >
        Server=postgres;
        Port=5432;
        Database=${DB_NAME:-datamodeler};
        User Id=${DB_USER:-postgres};
        Password=${DB_PASSWORD:-PostgresPassword123!};
        SSL Mode=disable;
        Trust Server Certificate=false;
      
      # Redis Configuration
      Redis__Host: redis
      Redis__Port: 6379
      Redis__Password: ${REDIS_PASSWORD:-RedisPassword123!}
      Redis__Database: 0
      Redis__CacheExpiration: 3600
      
      # JWT Settings
      JWT__Secret: ${JWT_SECRET:-DefaultSecretKeyChangeInProduction!2024}
      JWT__Issuer: ${JWT_ISSUER:-DataModeler}
      JWT__Audience: ${JWT_AUDIENCE:-DataModelerApp}
      JWT__ExpiryMinutes: 60
      
      # Logging
      Logging__LogLevel__Default: ${LOG_LEVEL:-Information}
      Logging__LogLevel__Microsoft: Warning
      Serilog__MinimumLevel: ${LOG_LEVEL:-Information}
      
      # Application Settings
      App__Name: DataModeler
      App__Version: ${VERSION:-1.0.0}
      App__Environment: ${ASPNETCORE_ENVIRONMENT:-Production}
      
      # CORS Settings
      CORS__AllowedOrigins: ${CORS_ORIGINS:-http://localhost:3000}
      CORS__AllowedMethods: GET,POST,PUT,DELETE,PATCH
      CORS__AllowedHeaders: Content-Type,Authorization
      
      # Performance
      DOTNET_TieredCompilation: "1"
      DOTNET_TieredCompilationQuickJit: "1"
      DOTNET_EnableDiagnostics: "0"
      
      # Timezone
      TZ: UTC
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ./backend/logs:/app/logs
      - ./backend/config:/app/config:ro
    networks:
      - datamodeler-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "com.datamodeler.service=backend"

  # Frontend (Next.js)
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        BUILD_DATE: ${BUILD_DATE:-$(date -u +'%Y-%m-%dT%H:%M:%SZ')}
        VCS_REF: ${VCS_REF:-unknown}
        VERSION: ${VERSION:-1.0.0}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:8080/api}
    container_name: datamodeler-frontend
    hostname: frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080/api}
      NEXT_PUBLIC_APP_NAME: DataModeler
      NEXT_PUBLIC_APP_VERSION: ${VERSION:-1.0.0}
      NEXT_PUBLIC_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      TZ: UTC
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend/logs:/app/.next/logs
    networks:
      - datamodeler-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "com.datamodeler.service=frontend"

volumes:
  postgres_data:
    driver: local
  postgres_logs:
    driver: local
  redis_data:
    driver: local

networks:
  datamodeler-network:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br-datamodeler
    ipam:
      config:
        - subnet: 172.28.0.0/16
