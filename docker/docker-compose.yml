services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: datamodeler-postgres
    environment:
      POSTGRES_DB: datamodeler_app
      POSTGRES_USER: datamodeler_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password_123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    networks:
      - datamodeler-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U datamodeler_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # .NET Backend API
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: datamodeler-backend
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=datamodeler_app;Username=datamodeler_user;Password=${DB_PASSWORD:-secure_password_123}"
      Jwt__Secret: ${JWT_SECRET:-your-256-bit-secret-key-minimum-32-characters-required}
      Jwt__Issuer: ${JWT_ISSUER:-https://datamodeler.local}
      Jwt__Audience: ${JWT_AUDIENCE:-datamodeler-api}
      CORS__AllowedOrigins: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - datamodeler-network
    volumes:
      - ../backend/logs:/app/logs

  # Next.js Frontend
  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: datamodeler-frontend
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:5000}
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - datamodeler-network

volumes:
  postgres_data:
    driver: local

networks:
  datamodeler-network:
    driver: bridge
